<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Court Console</title>
    <style>
        :root {
            --primary: #2A4365;
            --secondary: #C53030;
            --accent: #2F855A;
            --background: #EDF2F7;
        }

        body {
            font-family: 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: var(--background);
            color: #1A202C;
            margin: 0;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 3rem;
            color: var(--primary);
            font-size: 2.5rem;
            letter-spacing: -0.025em;
        }

        #sqlForm {
            background: white;
            border-radius: 10px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.03);
            border: 1px solid #E2E8F0;
        }

        #query {
            width: 100%;
            height: 160px;
            padding: 1.5rem;
            border: 2px solid #CBD5E0;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            margin: 1.5rem 0;
            resize: vertical;
            background: #FFFFFF;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #query:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(42, 67, 101, 0.1);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem 2.4rem;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            width: auto;
            min-width: 200px;
            margin: 0 auto;
            justify-content: center;
        }

        button:hover {
            background: #1C3052;
            transform: scale(1.02);
        }

        #result {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            border: 1px solid #E2E8F0;
            margin-top: 2rem;
            overflow-x: auto;
        }

        .data-table th {
            text-align: left;
            padding: 1.2rem;
            background-color: #F7FAFC;
            color: #4A5568;
            font-weight: 600;
            border-bottom: 2px solid #E2E8F0;
        }

        .data-table td {
            padding: 1.2rem;
            border-bottom: 1px solid #EDF2F7;
            vertical-align: middle;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background-color: #F8FAFC;
        }

        .error-message {
            background: #FFF5F5;
            color: #C53030;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #FED7D7;
            font-family: monospace;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Court Console</h1>

    <form id="sqlForm">
        <textarea
                id="query"
                name="query"
                placeholder="Enter legal SQL operation here"
                spellcheck="false"></textarea>
        <div style="text-align: center;">
            <button type="button" onclick="executeQuery()">
                Execute Statement
            </button>
        </div>
    </form>

    <div id="result">⊳ </div>
</div>

<script>
    function formatResult(data) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '';

        if (data.startsWith('Error:')) {
            const error = document.createElement('div');
            error.className = 'error-message';
            error.textContent = data;
            resultDiv.appendChild(error);
            return;
        }

        const rows = data.split('<br>').filter(row => row.trim() !== '');
        if (rows.length === 0) {
            resultDiv.textContent = 'No data found';
            return;
        }

        const table = document.createElement('table');
        table.className = 'data-table';

        // Header
        const headerRow = document.createElement('tr');
        rows[0].split('\t').forEach(cell => {
            const th = document.createElement('th');
            th.textContent = cell.trim();
            headerRow.appendChild(th);
        });
        table.appendChild(headerRow);

        // Body
        for (let i = 1; i < rows.length; i++) {
            const tr = document.createElement('tr');
            rows[i].split('\t').forEach(cell => {
                const td = document.createElement('td');
                td.textContent = cell.trim();
                tr.appendChild(td);
            });
            table.appendChild(tr);
        }

        resultDiv.appendChild(table);
    }

    function executeQuery() {
        const query = document.getElementById('query').value;
        const resultDiv = document.getElementById('result');

        fetch('/data/execute', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: new URLSearchParams({ query })
        })
            .then(response => response.text())
            .then(data => {
                formatResult(data);
            })
            .catch(error => {
                resultDiv.innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
            });
    }
</script>
</body>
</html>
